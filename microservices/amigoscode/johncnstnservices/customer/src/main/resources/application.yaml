server:
  port: 8080

spring:
  application:
    name: customer
  datasource:
    username: johncnstn
    password: password
#    localhost because we are running the app it's not a container.
#    network must be used if running via docker
    url: jdbc:postgresql://localhost:5432/customer

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

eureka:
  client:
    service-url:
      default-zone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true